name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          # Pin a Windows job on the latest Python only — exercises the
          # path-handling code that differs between platforms.
          - python-version: "3.12"
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync project (with test extras)
        run: uv sync --extra test

      - name: Lint with ruff
        run: uv run --with ruff ruff check .

      - name: Run pytest
        run: uv run --extra test pytest tests/ -q

      - name: Dry-run the router
        run: uv run python router.py --dry-run
