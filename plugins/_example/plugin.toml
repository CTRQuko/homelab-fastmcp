# Reference plugin manifest. The loader ignores directories starting with '_'
# so this one is never mounted; copy it to plugins/<yourname>/ as a starting
# point when authoring a real plugin.

[plugin]
name = "example"
version = "0.1.0"
enabled = false

[runtime]
entry = "server.py"
python = ">=3.11"
deps = []
venv = "auto"

[security]
# Credential references the plugin may request from the vault.
# THIS IS THE ONLY FIELD ACTIVELY ENFORCED TODAY (plus [tools] below).
credential_refs = ["EXAMPLE_*"]

# --- Reserved for future enforcement (Layer 5 — see docs/security-model.md).
# The fields below are PARSED but NOT YET ENFORCED. Treat them as
# documentation of intent for plugin authors and a future-proofing hook —
# do NOT rely on them as a sandbox: a subprocess plugin still inherits
# the OS permissions of the router process. Real enforcement requires
# seccomp/landlock/namespaces and ships with the plugin runtime sandbox
# milestone, not before.
inventory_access = ["hosts:type=linux"]   # not enforced
network_dynamic = false                   # not enforced
filesystem_read = []                      # not enforced
filesystem_write = []                     # not enforced
exec = []                                 # not enforced

[requires]
hosts = [
  { type = "linux", min = 1, prompt = "Add at least one Linux host with SSH credentials." }
]
credentials = [
  { pattern = "EXAMPLE_TOKEN", prompt = "Token used by the example plugin." }
]

[tools]
whitelist = []
blacklist = []
