# UniFi Controller plugin — wrapper sobre `uvx unifi-mcp-server`
# (paquete upstream de https://github.com/enuno/unifi-mcp-server, PyPI:
# https://pypi.org/project/unifi-mcp-server/).
#
# Origen: Fase 7 cutover plan en docs/operator-notes/cutover/manifests/unifi/
# Materialized: 2026-05-08.
#
# El paquete expone 74 tools sobre el UniFi Network Controller (devices,
# clients, network config, firewall, QoS, WiFi, backup, port-forwarding,
# DPI analytics, topology, RADIUS). Auth via API_KEY (header `x-api-key`,
# NO Bearer).

[plugin]
name = "unifi"
version = "1.0.0"
enabled = true

[runtime]
# uvx ejecuta el paquete en un venv efímero — no requiere checkout local.
# Cada spawn baja la última versión cacheada de PyPI.
command = "uvx"
args = ["unifi-mcp-server"]

[security]
credential_refs = [
  "UNIFI_API_KEY",
  "UNIFI_API_TYPE",
  "UNIFI_LOCAL_HOST",
  "UNIFI_LOCAL_PORT",
  "UNIFI_LOCAL_VERIFY_SSL",
  "UNIFI_DEFAULT_SITE",
  "UNIFI_SITE_MANAGER_ENABLED",
]

[[requires.credentials]]
pattern = "UNIFI_API_KEY"
prompt = """
UniFi API Key — generada en https://<controller>:11443 → Settings →
Admin → API Keys → Create New. Header de auth: x-api-key (no Bearer).
Sin esta key todas las tools devuelven 401.
"""

[[requires.credentials]]
pattern = "UNIFI_LOCAL_HOST"
prompt = """
IP del UniFi controller en tu LAN/Tailscale (e.g. 10.0.1.10). El plugin
usa este host con UNIFI_LOCAL_PORT (default 11443, no 443) para la API
local. Modo recomendado: UNIFI_API_TYPE=local (full functionality).
"""
